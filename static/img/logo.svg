<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200" width="260" height="200">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#00ff9d"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00ff9d" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#ffe94a"/>
      <stop offset="30%" stop-color="#ffd000"/>
      <stop offset="60%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#ffe94a"/>
    </linearGradient>
    <linearGradient id="coinShine" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coinShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#f5a623" flood-opacity="0.5"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="coinClip">
      <circle cx="0" cy="0" r="18"/>
    </clipPath>
  </defs>

  <!-- BACK half of the oval ring (behind text) -->
  <ellipse cx="130" cy="100" rx="120" ry="55" fill="none" stroke="url(#ringGrad2)" stroke-width="2.5" stroke-dasharray="3 4" opacity="0.5" transform="rotate(-12, 130, 100)"/>

  <!-- Main text -->
  <text x="130" y="110" font-family="'Montserrat', 'Arial Black', Impact, sans-serif" font-weight="900" font-size="42" text-anchor="middle" letter-spacing="3" filter="url(#textGlow)">
    <tspan fill="#ffffff">MM</tspan><tspan fill="#00ff9d">FLIP</tspan>
  </text>

  <!-- FRONT half of the oval ring (in front of text) -->
  <!-- Top arc of the tilted ellipse -->
  <path d="M 10.5,94.5 A 120,55 -12 0,1 249.5,94.5" fill="none" stroke="url(#ringGrad)" stroke-width="2.8" stroke-linecap="round" filter="url(#glow)" transform="rotate(-12, 130, 100)"/>

  <!-- Second subtle ring, slightly offset -->
  <ellipse cx="130" cy="100" rx="124" ry="58" fill="none" stroke="url(#ringGrad)" stroke-width="0.5" opacity="0.15" transform="rotate(-12, 130, 100)"/>

  <!-- COIN on the ring (top-right position) -->
  <g transform="translate(222, 52)" filter="url(#coinShadow)">
    <!-- Coin body -->
    <circle cx="0" cy="0" r="18" fill="url(#coinGrad)" stroke="#c8960c" stroke-width="2"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#daa520" stroke-width="0.8" opacity="0.5"/>
    <!-- Notches -->
    <circle cx="0" cy="0" r="16.5" fill="none" stroke="#b8860b" stroke-width="0.5" stroke-dasharray="1.5 3" opacity="0.4"/>
    <!-- Shine -->
    <circle cx="0" cy="0" r="17" fill="url(#coinShine)"/>
    <!-- Dollar sign -->
    <text x="0" y="7" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="18" fill="#6b4c00" text-anchor="middle" opacity="0.8">$</text>
  </g>

  <!-- Small glow dots along the ring path for sparkle effect -->
  <circle cx="18" cy="108" r="1.5" fill="#00e5ff" opacity="0.6"/>
  <circle cx="50" cy="62" r="1" fill="#00e5ff" opacity="0.4"/>
  <circle cx="95" cy="46" r="1.2" fill="#00ff9d" opacity="0.5"/>
  <circle cx="170" cy="44" r="1" fill="#00ff9d" opacity="0.5"/>
  <circle cx="240" cy="80" r="1.3" fill="#00e5ff" opacity="0.4"/>
  <circle cx="200" cy="150" r="1" fill="#00ff9d" opacity="0.3"/>
  <circle cx="60" cy="148" r="1.2" fill="#00e5ff" opacity="0.3"/>
</svg>
